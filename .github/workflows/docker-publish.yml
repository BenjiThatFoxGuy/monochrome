name: Publish Docker Image

on:
    push:
        branches: [main]
    release:
        types: [published]
    pull_request:
        branches: [main]

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=ref,event=pr

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      AUTH_ENABLED=${{ github.event_name != 'pull_request' && secrets.AUTH_ENABLED || '' }}
                      AUTH_SECRET=${{ github.event_name != 'pull_request' && secrets.AUTH_SECRET || '' }}
                      POCKETBASE_URL=${{ github.event_name != 'pull_request' && secrets.POCKETBASE_URL || '' }}
                      SESSION_MAX_AGE=${{ github.event_name != 'pull_request' && secrets.SESSION_MAX_AGE || '' }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    build-and-push-subsonic:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata (Subsonic)
              id: meta-subsonic
              uses: docker/metadata-action@v5
              with:
                  images: ghcr.io/${{ github.repository }}-subsonic
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=ref,event=pr

            - name: Build and push Subsonic image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile.subsonic
                  platforms: linux/amd64,linux/arm64
                  push: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
                  tags: ${{ steps.meta-subsonic.outputs.tags }}
                  labels: ${{ steps.meta-subsonic.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
